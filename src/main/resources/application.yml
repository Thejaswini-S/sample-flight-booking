server:
  port: 8081

spring:
  application:
    name: flight-booking-api
  # No default profile is baked into the packaged artifact: the jar / Docker image runs profile-less
  # (no seed data, INFO logging). Local `gradlew bootRun` activates `dev` (see build.gradle); set
  # SPRING_PROFILES_ACTIVE=dev (or prod) to choose a profile in any other environment.

# OpenAPI / Swagger UI (springdoc)
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# Directory used by logback-spring.xml for centralized rolling logs
logging:
  file:
    path: logs

# Application configuration bound via @ConfigurationProperties (see FlightSeedProperties).
# Seed data is environment-specific and overridden per profile (dev enables sample flights).
flight-booking:
  seed:
    enabled: false
    flights: []

# Actuator: health + info endpoints for observability
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  info:
    env:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    description: In-memory flight ticket booking API (no overbooking)
    version: 1.0.0

# Zalando Logbook: structured HTTP request/response logging (verbosity set per profile)
logbook:
  format:
    style: http
