server:
  port: 8081

spring:
  application:
    name: flight-booking-api

# OpenAPI / Swagger UI (springdoc)
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# Directory used by logback-spring.xml for centralized rolling logs
logging:
  file:
    path: logs
